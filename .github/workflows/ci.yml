name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    name: Lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (pins Python 3.11)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Lint (ruff)
        run: uvx ruff check .

      - name: Tests (pytest)
        run: |
          # Day 1: no tests yet. pytest exits 5 on "no tests collected";
          # treat that as success until backend/tests/ has real tests.
          uvx pytest backend/tests || [ $? -eq 5 ]
