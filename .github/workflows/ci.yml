name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Lint (ruff)
        run: uvx ruff check .

      - name: Install dependencies (incl. vehicle-safety-mcp from GitHub)
        run: uv sync --frozen

      # Live tests (backend/tests/live) are excluded by the `-m 'not live'`
      # default in pyproject, so this stays offline and deterministic.
      - name: Unit tests (offline)
        run: uv run --no-sync pytest
