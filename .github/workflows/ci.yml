name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    name: Lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (pins Python 3.11)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Lint (ruff)
        run: uvx ruff check .

      - name: Install dependencies (incl. vehicle-safety-mcp from GitHub)
        run: uv sync --frozen

      - name: Tests (pytest)
        run: uv run --no-sync pytest
