# Golden eval set — vehicle-safety-agent
#
# This file defines what "working" means BEFORE the agent exists. Every data-backed
# fact was captured from the live US NHTSA public APIs on the pinned retrieved_on date.
#
# Per-item schema:
#   id                  unique string
#   category            one of the categories listed below
#   question            the user question fed to the agent
#   required_facts      facts a correct answer MUST contain. Each entry is either:
#                         - a plain string        -> normalized substring match
#                         - {any_of: [str, ...]}  -> passes if ANY listed string matches
#                         - {all_of: [str, ...]}  -> passes if ALL listed strings match
#                         - {regex: "pattern"}    -> case-insensitive regex search
#   forbidden_behaviors natural-language behaviors a correct answer MUST NOT exhibit
#                       (graded by the LLM judge)
#   grading_notes       authoritative guidance for the judge / human grader
#   forbidden_patterns  (optional) regex strings that deterministically flag a
#                       forbidden behavior when present in the answer
#   retrieved_on        (data-backed items) the date the ground truth was captured
#
# Counts are a FLOOR pinned to retrieved_on: NHTSA adds recalls/complaints over time,
# so a correct answer may report a higher count. Campaign numbers, by contrast, are
# stable anchors — a campaign never un-happens — so they are the deterministic facts.

version: "0.2.0"
description: >-
  Golden correctness set for the vehicle-safety agent. Ground truth captured from the
  US NHTSA public APIs (recallsByVehicle, vPIC DecodeVinValues, SafetyRatings,
  complaintsByVehicle) and, as of v0.2.0, the EU Safety Gate (RAPEX) motor-vehicle
  recall export. Two jurisdictions are now in scope; Euro NCAP RAG remains roadmap.
source: >-
  US NHTSA public APIs (api.nhtsa.gov + vpic.nhtsa.dot.gov) and EU Safety Gate
  (ec.europa.eu/safety-gate-alerts, XML search export)
retrieved_on: "2026-07-17"

# Changelog
#   v0.2.0 (2026-07-22) — EU Safety Gate slice (ADR 002):
#     - NEW category eu_recall_lookup (4 items), pinned to real EU Safety Gate
#       motor-vehicle alerts captured live on 2026-07-22 (case numbers like
#       A12/00188/24, SR/00355/26). Includes one US<->EU cross-reference item.
#     - CORRECT-ANSWER FLIP (capability grew): the VW ID.3 question was oos_03, a
#       PASSING "I only have US data, ID.3 not covered" refusal in v0.1.0. With the
#       EU Safety Gate tool now live, that refusal is WRONG — the correct answer is
#       to USE the EU tool and label the jurisdiction. The item moved from
#       out_of_scope_refusal (now 3 items) to eu_recall_lookup as eu_03, with its
#       expected behavior inverted. This is deliberate eval history: a golden answer
#       changing because the product gained a capability is a feature, not a broken
#       test. The v0.1.0 result files remain valid for the capability they graded.
#     - EU case numbers are the EU analogue of NHTSA campaign numbers: pinned at
#       retrieved_on and treated as a FLOOR (Safety Gate returns most-recent-first
#       and grows over time), so required_facts use any_of over several real recent
#       case numbers for resilience.

items:
  # ======================================================================
  # us_recall_lookup (6) — specific make/model/year recall questions.
  # Ground truth: recallsByVehicle. required_facts are exact NHTSACampaignNumbers.
  # ======================================================================
  - id: rec_01
    category: us_recall_lookup
    question: "What safety recalls affect the 2020 Honda Civic?"
    required_facts:
      - "21V215000"
      - "23V458000"
      - "24V064000"
    forbidden_behaviors:
      - "Reports a recall count without having actually queried NHTSA"
      - "Answers without attributing the data to NHTSA"
    grading_notes: >-
      As of 2026-07-17 NHTSA lists 5 recall campaigns for the 2020 Honda Civic:
      21V215000 (fuel pump), 23V458000 (brake master cylinder), 23V858000 (fuel pump),
      24V064000 (front-passenger occupant classification), 26V332000 (front-passenger
      occupant classification). The count (5) is a floor and may grow. A correct answer
      must include the campaign numbers above, report a count of at least 5, and
      attribute the data to NHTSA. Fabricating any campaign number is an automatic fail.
    retrieved_on: "2026-07-17"

