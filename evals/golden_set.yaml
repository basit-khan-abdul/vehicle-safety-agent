  # ======================================================================
  # vin_decode (3) — sample VINs, ground truth from vPIC DecodeVinValues.
  # ======================================================================
  - id: vin_01
    category: vin_decode
    question: "Decode this VIN: 5UXWX7C5*BA"
    required_facts:
      - "BMW"
      - "X3"
    forbidden_behaviors:
      - "Reports a make or model the VIN does not decode to"
      - "Invents a trim, plant, or model year not returned by vPIC"
    grading_notes: >-
      5UXWX7C5*BA is NHTSA vPIC's documented sample VIN (a partial VIN with a wildcard).
      It decodes to a BMW X3, Sport Utility Vehicle (SUV/MPV), trim xDrive35i; with a
      2011 model-year hint vPIC returns ModelYear 2011. Because it is a partial VIN, vPIC
      flags "6 - Incomplete VIN" — a correct answer may note the VIN is partial and that
      the model year is not fully determined without a hint. Do not require or invent a
      model year here.
    retrieved_on: "2026-07-17"

  - id: vin_02
    category: vin_decode
    question: "What vehicle is VIN 1HGCM82633A004352?"
    required_facts:
      - "Honda"
      - "Accord"
      - "2003"
    forbidden_behaviors:
      - "Reports a make, model, or year the VIN does not decode to"
      - "Invents attributes not returned by vPIC"
    grading_notes: >-
      1HGCM82633A004352 is a full, valid VIN; vPIC decodes it clean ("0 - VIN decoded
      clean. Check Digit is correct"). It is a 2003 Honda Accord, Coupe, trim EX-V6.
      A correct answer must give make Honda, model Accord, and model year 2003.
    retrieved_on: "2026-07-17"

  - id: vin_03
    category: vin_decode
    question: "Decode VIN 5YJ3E1EA7KF328931 and tell me the make, model, and year."
    required_facts:
      - "Tesla"
      - "Model 3"
      - "2019"
    forbidden_behaviors:
      - "Reports a make, model, or year the VIN does not decode to"
      - "Invents attributes not returned by vPIC"
    grading_notes: >-
      5YJ3E1EA7KF328931 decodes to a 2019 Tesla Model 3, Sedan. vPIC returns a
      check-digit warning ("1 - Check Digit does not calculate properly") but the make,
      model, and model year still decode. A correct answer must give Tesla, Model 3, 2019;
      it may mention the check-digit note.
    retrieved_on: "2026-07-17"

  # ======================================================================
  # comparison (4) — NCAP crash ratings, ground truth from SafetyRatings.
  # ======================================================================
  - id: cmp_01
    category: comparison
    question: "Compare the crash-test ratings of the 2021 Toyota RAV4 and the 2021 Honda CR-V."
    required_facts:
      - "RAV4"
      - "CR-V"
      - "5-star"
    forbidden_behaviors:
      - "Reports a star rating NHTSA did not assign to that vehicle"
      - "Declares an overall 'winner' when both earn 5-star overall, without citing the sub-rating that differs"
    grading_notes: >-
      As of 2026-07-17 NHTSA NCAP overall ratings: 2021 Toyota RAV4 = 5 stars (frontal 4,
      side 5, rollover 4); 2021 Honda CR-V = 5 stars (frontal 5, side 5, rollover 4).
      Both are 5-star overall. A correct answer must state both overall ratings and must
      not fabricate an overall winner; the only meaningful difference is the frontal
      crash rating (CR-V 5 vs RAV4 4), which a strong answer surfaces.
    retrieved_on: "2026-07-17"

  - id: cmp_02
    category: comparison
    question: "Which is safer in crash tests, a 2020 Honda Civic or a 2020 Toyota Corolla?"
    required_facts:
      - "Civic"
      - "Corolla"
      - "5-star"
    forbidden_behaviors:
      - "Reports a star rating NHTSA did not assign to that vehicle"
      - "Claims one is safer overall when both earn 5-star overall, without citing sub-ratings"
    grading_notes: >-
      As of 2026-07-17 NHTSA NCAP overall: 2020 Honda Civic = 5 stars (4-door frontal 5,
      2-door frontal 4; side 5; rollover 5); 2020 Toyota Corolla = 5 stars (frontal 5,
      side 5, rollover 4). Both are 5-star overall. A correct answer must give both
      overall ratings and, if it names a "safer" pick, ground it in a specific sub-rating
      rather than the identical overall score.
    retrieved_on: "2026-07-17"

  - id: cmp_03
    category: comparison
    question: "Compare NCAP safety ratings for the 2022 Tesla Model 3 and the 2022 Subaru Outback."
    required_facts:
      - "Model 3"
      - "Outback"
      - "5-star"
    forbidden_behaviors:
      - "Reports a star rating NHTSA did not assign to that vehicle"
      - "Fabricates a difference in overall rating that does not exist"
    grading_notes: >-
      As of 2026-07-17 NHTSA NCAP overall: 2022 Tesla Model 3 = 5 stars (frontal 5,
      side 5, rollover 5); 2022 Subaru Outback = 5 stars (frontal 5, side 5, rollover 4).
      Both are 5-star overall. A correct answer must give both overall ratings; the only
      sub-rating difference is rollover (Model 3 5 vs Outback 4).
    retrieved_on: "2026-07-17"

  - id: cmp_04
    category: comparison
    question: "How do the crash ratings of the 2019 Chevrolet Silverado 1500 crew cab and extended cab compare?"
    required_facts:
      - "crew cab"
      - "extended cab"
      - "4-star"
      - "5-star"
    forbidden_behaviors:
      - "Collapses the model into a single overall rating that ignores body style"
      - "Misattributes the 4-star and 5-star ratings to the wrong cab"
    grading_notes: >-
      As of 2026-07-17 the 2019 Chevrolet Silverado 1500 NCAP overall rating varies by
      cab style: Crew Cab (PU/CC) = 4 stars; Extended Cab (PU/EC) and Regular Cab (PU/RC)
      = 5 stars (all with frontal 4, side 5, rollover 4). A correct answer must NOT give a
      single number for "the Silverado" — it must attribute 4-star overall to the crew cab
      and 5-star overall to the extended cab.
    retrieved_on: "2026-07-17"

