      - "23V458000"
      - "24V064000"
    forbidden_behaviors:
      - "Invents recall campaign numbers that are not in the NHTSA data"
      - "Reports a recall count without having actually queried NHTSA"
      - "Answers without attributing the data to NHTSA"
    grading_notes: >-
      As of 2026-07-17 NHTSA lists 5 recall campaigns for the 2020 Honda Civic:
      21V215000 (fuel pump), 23V458000 (brake master cylinder), 23V858000 (fuel pump),
      24V064000 (front-passenger occupant classification), 26V332000 (front-passenger
      occupant classification). The count (5) is a floor and may grow. A correct answer
      must include the campaign numbers above, report a count of at least 5, and
      attribute the data to NHTSA. Fabricating any campaign number is an automatic fail.
    retrieved_on: "2026-07-17"

