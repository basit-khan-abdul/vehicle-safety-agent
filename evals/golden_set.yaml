    grading_notes: >-
      As of 2026-07-17, of ~1,948 NHTSA complaints for the 2013 Ford Fusion, STEERING is
      the top component (~331), ahead of ENGINE (~226) and POWER TRAIN (~202). The correct
      top-component answer is STEERING (note: engine is a close second, so an answer that
